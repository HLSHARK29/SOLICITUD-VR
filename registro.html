<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | SOLICITUD_VR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-indigo-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-indigo-100">
        <div class="text-center mb-6">
            <img src="assets/icon-192x192.png?v=1.0.0" alt="Logo SOLICITUD_VR" class="w-20 h-20 mx-auto mb-3 object-contain">
            <h2 class="text-2xl font-bold text-gray-800">Crear Cuenta</h2>
            <p class="text-gray-500 text-sm">Configura tu acceso a SOLICITUD_VR</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Correo Electrónico</label>
                <input type="email" id="regEmail" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Contraseña</label>
                <input type="password" id="regPassword" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">PIN de Acceso (Opcional)</label>
                <input type="password" id="regPin" maxlength="4" placeholder="4 dígitos" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition text-center tracking-widest">
            </div>

            <button onclick="ejecutarRegistro()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg transition shadow-lg mt-2">
                Registrar Cuenta
            </button>
        </div>

        <div class="mt-6 text-center">
            <p class="text-xs text-gray-400">¿Ya tienes cuenta? <a href="login.html" class="text-indigo-600 font-bold hover:underline">Inicia sesión</a></p>
        </div>
    </div>

    <script type="module">
        import { registrarUsuario } from "./js/auth.js";

        window.ejecutarRegistro = async () => {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const pin = document.getElementById('regPin').value;
            
            if (!email || !password) {
                return alert("Por favor completa el correo y la contraseña.");
            }

            if (pin && pin.length !== 4) {
                return alert("El PIN debe ser de 4 dígitos exactos.");
            }

            try {
                await registrarUsuario(email, password, pin || null);
                alert("Cuenta creada con éxito. Redirigiendo...");
                window.location.href = "index.html";
            } catch (error) {
                console.error(error);
                alert("Error al registrar: " + error.message);
            }
        };

        // Navegación con Enter
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const inputs = ['regEmail', 'regPassword', 'regPin'];
                const idx = inputs.indexOf(document.activeElement.id);
                if (idx > -1 && idx < inputs.length - 1) {
                    document.getElementById(inputs[idx + 1]).focus();
                } else {
                    window.ejecutarRegistro();
                }
            }
        });
    </script>
</body>
</html>
