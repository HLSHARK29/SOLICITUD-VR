<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>SOLICITUD_VR</title>

    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192x192.png?v=1.0.0">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512x512.png?v=1.0.0">
    <link rel="apple-touch-icon" href="assets/icon-192x192.png?v=1.0.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen pb-24">

    <nav class="bg-indigo-600 text-white shadow-md px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <img src="assets/icon-192x192.png?v=1.0.0" alt="Logo" class="h-8 w-auto object-contain">
            <h1 class="text-xl font-bold tracking-wider">SOLICITUD_VR</h1>
        </div>
        <div class="flex items-center space-x-4">
            <span class="text-xs bg-indigo-700 px-3 py-1.5 rounded-lg border border-indigo-500 text-indigo-100">
                <i class="fa-solid fa-gear mr-1"></i> Listas Dinámicas Activas
            </span>
            <button onclick="cerrarSesion()" class="text-white hover:text-indigo-200 transition">
                <i class="fa-solid fa-right-from-bracket"></i> <span class="text-xs font-bold ml-1">Salir</span>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8 space-y-6">
        
        <div class="flex justify-between items-center bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
            <div>
                <h2 class="text-base font-bold text-gray-800">Control de Pendientes</h2>
                <p class="text-gray-500 text-xs">Fila = Editar datos. Icono <i class="fa-solid fa-arrow-up-right-from-square text-indigo-500 text-[10px]"></i> = Abrir Microsoft.</p>
            </div>
            <div class="flex space-x-2">
                <button onclick="togglePanelListas()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium px-3 py-2 rounded-lg text-sm border border-gray-300 transition flex items-center space-x-1.5">
                    <i class="fa-solid fa-sliders"></i>
                    <span class="hidden sm:inline">Configurar Catálogos</span>
                </button>
                <button onclick="abrirModalNuevo()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-4 py-2 rounded-lg shadow transition flex items-center space-x-2 text-sm">
                    <i class="fa-solid fa-plus"></i>
                    <span>Agregar Nuevo</span>
                </button>
            </div>
        </div>

        <div id="panelListas" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-100 p-4 rounded-xl border border-gray-300 shadow-inner">
            <div class="bg-white p-4 rounded-lg border border-gray-200 space-y-2">
                <h4 class="font-bold text-gray-700 text-xs uppercase tracking-wider"><i class="fa-solid fa-cubes text-indigo-500 mr-1"></i> Catálogo de Productos</h4>
                <div class="flex gap-2">
                    <input type="text" id="nuevoProductoInput" placeholder="Ej. Insulpanel" class="grow px-2 py-1 border rounded text-xs focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    <button onclick="agregarItemCatalogo('productos', 'nuevoProductoInput')" class="bg-indigo-600 text-white px-3 py-1 rounded text-xs font-medium hover:bg-indigo-700">Añadir</button>
                </div>
                <div id="listaProductosCrud" class="flex flex-wrap gap-1.5 max-h-24 overflow-y-auto pt-1"></div>
            </div>

            <div class="bg-white p-4 rounded-lg border border-gray-200 space-y-2">
                <h4 class="font-bold text-gray-700 text-xs uppercase tracking-wider"><i class="fa-solid fa-user-tie text-indigo-500 mr-1"></i> Catálogo de Asesores</h4>
                <div class="flex gap-2">
                    <input type="text" id="nuevoAsesorInput" placeholder="Ej. Jessica" class="grow px-2 py-1 border rounded text-xs focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    <button onclick="agregarItemCatalogo('asesores', 'nuevoAsesorInput')" class="bg-indigo-600 text-white px-3 py-1 rounded text-xs font-medium hover:bg-indigo-700">Añadir</button>
                </div>
                <div id="listaAsesoresCrud" class="flex flex-wrap gap-1.5 max-h-24 overflow-y-auto pt-1"></div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 text-gray-700 text-xs uppercase font-semibold tracking-wider">
                            <th class="px-4 py-4 w-12 text-center">#</th>
                            <th class="px-4 py-4 w-12 text-center">Link</th>
                            <th class="px-6 py-4">Tipo de Solicitud</th>
                            <th class="px-6 py-4">Producto</th>
                            <th class="px-6 py-4">Asesor</th>
                            <th class="px-4 py-4">Fecha</th>
                            <th class="px-4 py-4">Hora</th>
                            <th class="px-4 py-4 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCuerpo" class="divide-y divide-gray-100 text-sm text-gray-600"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalAgregar" class="hidden fixed inset-0 bg-gray-900/50 backdrop-blur-sm flex justify-center items-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl border border-gray-100 w-full max-w-md overflow-hidden animate-fade-in">
            <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h3 class="font-bold text-gray-800 text-base" id="modalTitulo">Registrar nuevo pendiente</h3>
                <button onclick="cerrarModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Enlace de Microsoft</label>
                    <input type="url" id="inputLink" placeholder="Pegar el link aquí..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm" onkeydown="evaluarEnter(event)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Tipo de Solicitud</label>
                    <select id="selectTipo" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm bg-white" onkeydown="evaluarEnter(event)">
                        <option value="Alta">Alta</option>
                        <option value="Asignación">Asignación</option>
                        <option value="Corrección">Corrección</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Producto (Opcional)</label>
                    <select id="selectProducto" onchange="controlarCampoOtro()" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm bg-white" onkeydown="evaluarEnter(event)">
                    </select>
                </div>
                <div id="contenedorOtro" class="hidden">
                    <label class="block text-xs font-semibold text-amber-600 uppercase tracking-wider mb-1">Especificar Producto</label>
                    <input type="text" id="inputOtro" placeholder="Escribe el producto manual..." class="w-full px-3 py-2 border border-amber-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm bg-amber-50/50" onkeydown="evaluarEnter(event)">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Asesor (Opcional)</label>
                    <select id="selectAsesor" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm bg-white" onkeydown="evaluarEnter(event)">
                    </select>
                </div>
            </div>

            <div class="bg-gray-50 px-6 py-3 border-t border-gray-200 flex justify-end space-x-2">
                <button onclick="cerrarModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 text-sm font-medium hover:bg-gray-100 transition">Cancelar</button>
                <button onclick="procesarFormulario()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition flex items-center space-x-2">
                    <i class="fa-solid fa-cloud-arrow-up" id="btnIconoGuardar"></i>
                    <span id="btnTextoGuardar">Insertar al Radar</span>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { cerrarSesion, verificarSesion } from "./js/auth.js";
        
        window.cerrarSesion = cerrarSesion;
        verificarSesion();
    </script>

    <script type="module" src="js/app.js?v=1.0.0"></script>
</body>
</html>
