<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | SOLICITUD_VR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-indigo-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-indigo-100">
        <div class="text-center mb-6">
            <img src="assets/icon-192x192.png?v=1.0.0" alt="Logo SOLICITUD_VR" class="w-20 h-20 mx-auto mb-3 object-contain">
            <h2 class="text-2xl font-bold text-gray-800">SOLICITUD_VR</h2>
            <p class="text-gray-500 text-sm">Ingresa a tu entorno seguro</p>
        </div>

        <div id="loginForm" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Correo Electrónico</label>
                <input type="email" id="loginEmail" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>

            <div class="flex bg-gray-100 p-1 rounded-lg">
                <button id="btnTabPass" onclick="toggleMetodo('password')" class="flex-1 py-1.5 text-xs font-bold rounded-md bg-white shadow text-indigo-600">Contraseña</button>
                <button id="btnTabPin" onclick="toggleMetodo('pin')" class="flex-1 py-1.5 text-xs font-bold rounded-md text-gray-500">PIN</button>
            </div>

            <div id="inputPasswordContainer">
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Contraseña</label>
                <input type="password" id="loginPassword" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>

            <div id="inputPinContainer" class="hidden">
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">PIN de Acceso</label>
                <input type="password" id="loginPin" maxlength="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-center tracking-widest text-lg" placeholder="****">
            </div>

            <button onclick="intentarLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg transition shadow-lg">
                Iniciar Sesión
            </button>
        </div>

        <div class="mt-6 text-center">
            <p class="text-xs text-gray-400">¿No tienes cuenta? <a href="registro.html" class="text-indigo-600 font-bold hover:underline">Regístrate aquí</a></p>
        </div>
    </div>

    <script type="module">
        import { iniciarSesion } from "./js/auth.js";

        window.metodoActual = 'password';

        window.toggleMetodo = (metodo) => {
            window.metodoActual = metodo;
            // Limpieza de campos al cambiar método
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginPin').value = '';
            
            const btnPass = document.getElementById('btnTabPass');
            const btnPin = document.getElementById('btnTabPin');
            const passCont = document.getElementById('inputPasswordContainer');
            const pinCont = document.getElementById('inputPinContainer');

            if (metodo === 'password') {
                btnPass.classList.add('bg-white', 'shadow', 'text-indigo-600');
                btnPin.classList.remove('bg-white', 'shadow', 'text-indigo-600');
                passCont.classList.remove('hidden');
                pinCont.classList.add('hidden');
            } else {
                btnPin.classList.add('bg-white', 'shadow', 'text-indigo-600');
                btnPass.classList.remove('bg-white', 'shadow', 'text-indigo-600');
                passCont.classList.add('hidden');
                pinCont.classList.remove('hidden');
            }
        };

        window.intentarLogin = async () => {
            try {
                await iniciarSesion(
                    document.getElementById('loginEmail').value,
                    document.getElementById('loginPassword').value,
                    window.metodoActual === 'pin' ? document.getElementById('loginPin').value : null
                );
                window.location.href = "index.html";
            } catch (error) {
                alert("Error: " + error.message);
            }
        };

        // Navegación con Enter
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const inputs = Array.from(document.querySelectorAll('input:not([type="hidden"])')).filter(i => i.offsetParent !== null);
                const idx = inputs.indexOf(document.activeElement);
                if (idx > -1 && idx < inputs.length - 1) {
                    inputs[idx + 1].focus();
                } else {
                    window.intentarLogin();
                }
            }
        });
    </script>
</body>
</html>
